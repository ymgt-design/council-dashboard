name: build-and-deploy

# config.json / data / build.py / src を変更して push すると、
# 検査 → ビルド → GitHub Pages へ自動デプロイする。
on:
  push:
    branches: [main]
    paths: ['config.json', 'data/**', 'build.py', 'src/**', 'scripts/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate data
        run: python scripts/validate.py
      - name: Build site and open data
        run: python build.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
